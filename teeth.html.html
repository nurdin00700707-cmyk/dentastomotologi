<!DOCTYPE html>

<meta charset="UTF-8">
<title>Teeth</title>

<style>
body{
  background:#020617;
  color:white;
  font-family:Arial;
  text-align:center;
}

#topTeeth,
#bottomTeeth{
  display:flex;
  justify-content:center;
  gap:8px;
  margin:15px 0;
}

.tooth{
  width:55px;
  height:70px;
  background:white;
  border:2px solid #cbd5e1;
  border-radius:25px 25px 15px 15px;
  color:black;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 0 10px rgba(255,255,255,.2);
}

.tooth:hover{
  transform:scale(1.1);
}

.deleted{
  background:red !important;
  color:white;
}

.crown{
  background:#3b82f6 !important;
  color:white;
}

.filling{
  background:#22c55e !important;
  color:white;
}

.canal{
  background:#f59e0b !important;
  color:white;
}

.bracket{
  background:#a855f7 !important;
  color:white;
}

select,
button{
  padding:10px;
  border:none;
  border-radius:8px;
  margin:5px;
}

button{
  background:#22c55e;
  color:white;
}
</style>
</head>
